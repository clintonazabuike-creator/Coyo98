<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHADOW-OS v2.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        :root { --neon: #00ff41; --danger: #ff003c; }
        body { margin: 0; background: #000; color: var(--neon); font-family: monospace; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; opacity: 0.7; }
        
        .hud-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border: 1px solid rgba(0,255,65,0.2); box-sizing: border-box;
        }

        .data-stream {
            position: absolute; top: 40px; left: 15px; font-size: 10px;
            text-shadow: 0 0 5px var(--neon); line-height: 1.5;
        }

        .nav-panel {
            position: absolute; bottom: 30px; left: 15px; right: 15px;
            background: rgba(0,10,0,0.95); border: 1px solid var(--neon);
            padding: 20px; border-radius: 2px; z-index: 1000;
            box-shadow: 0 0 20px rgba(0,255,65,0.2);
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            padding: 15px; background: #010; border: 1px solid var(--neon);
            color: var(--neon); font-family: monospace; font-size: 11px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        button:active { background: var(--neon); color: #000; }
        .recording { border-color: var(--danger); color: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="map"></div>
<div class="hud-overlay">
    <div class="data-stream" id="stream">
        SYS_STATUS: STANDBY<br>
        UPLINK: NULL<br>
        COORDS: 0.000, 0.000
    </div>
</div>

<div class="nav-panel">
    <div class="btn-grid">
        <button onclick="toggleSystem()" id="sys-btn">INITIATE UPLINK</button>
        <button onclick="dropPoint()">MARK TARGET</button>
        <button onclick="sonarMode()">SONAR RETURN</button>
        <button onclick="voiceToggle()">VOICE: ON</button>
    </div>
</div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [0, 0], zoom: 2, pitch: 70, bearing: 0
    });

    let path = [];
    let isTracking = false;
    let voiceEnabled = true;

    function speak(text) {
        if (!voiceEnabled) return;
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 1.2;
        msg.pitch = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function toggleSystem() {
        isTracking = !isTracking;
        const btn = document.getElementById('sys-btn');
        if (isTracking) {
            btn.innerText = "TERMINATE LINK";
            btn.classList.add('recording');
            speak("System online. Satellite uplink established.");
            startGPS();
        } else {
            location.reload();
        }
    }

    function startGPS() {
        navigator.geolocation.watchPosition((pos) => {
            const { latitude, longitude, speed } = pos.coords;
            const current = [longitude, latitude];
            path.push(current);

            document.getElementById('stream').innerHTML = `
                SYS_STATUS: ACTIVE<br>
                VELOCITY: ${(speed || 0).toFixed(1)} m/s<br>
                COORDS: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}
            `;

            updateMap(current);
            if (navigator.vibrate) navigator.vibrate(20);
        }, null, { enableHighAccuracy: true });
    }

    function updateMap(coords) {
        if (map.getSource('path')) {
            map.getSource('path').setData({
                "type": "Feature", "geometry": { "type": "LineString", "coordinates": path }
            });
        } else {
            map.addSource('path', { type: 'geojson', data: { "type": "Feature", "geometry": { "type": "LineString", "coordinates": path } } });
            map.addLayer({
                id: 'path', type: 'line', source: 'path',
                paint: { 'line-color': '#00ff41', 'line-width': 3 }
            });
        }
        map.easeTo({ center: coords, zoom: 18, bearing: map.getBearing() + 1 });
    }

    function dropPoint() {
        if (path.length === 0) return;
        new maplibregl.Marker({ color: '#ff003c' }).setLngLat(path[path.length-1]).addTo(map);
        speak("Target marked at current coordinates.");
    }

    function sonarMode() {
        speak("Sonar return protocol initiated. Detecting proximity to origin.");
        // Logic: Vibrates faster as you get closer to path[0]
        setInterval(() => {
            if (!isTracking || path.length < 2) return;
            // Simple proximity vibration logic would go here
            if (navigator.vibrate) navigator.vibrate(50);
        }, 3000);
    }

    function voiceToggle() {
        voiceEnabled = !voiceEnabled;
        document.querySelector('button[onclick="voiceToggle()"]').innerText = `VOICE: ${voiceEnabled ? 'ON' : 'OFF'}`;
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
</script>
</body>
</html>
