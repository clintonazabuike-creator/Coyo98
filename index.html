<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RADAR_OS // TACTICAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { background: #020617; color: #22c55e; font-family: 'Courier New', monospace; overflow: hidden; margin: 0; }
        #map { height: 60vh; width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(80%); background: #000; }
        .launcher-overlay { position: fixed; inset: 0; z-index: 9999; background: #020617; display: flex; flex-col; items: center; justify-content: center; padding: 2rem; }
        .radar-line { stroke: #22c55e; stroke-dasharray: 8, 8; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -16; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="launcher" class="launcher-overlay">
        <div class="text-center w-full max-w-xs">
            <div class="mb-6 p-4 border border-green-500/30 rounded-full inline-block">
                <div class="w-12 h-12 bg-green-500 rounded-full animate-ping opacity-20"></div>
            </div>
            <h1 class="text-2xl font-black tracking-[0.3em] mb-2 text-white">RADAR_OS</h1>
            <p id="boot-status" class="text-[10px] text-green-700 mb-8 uppercase tracking-widest">Awaiting System Authorization...</p>
            <button onclick="establishLink()" class="w-full bg-green-600 text-black font-black py-4 rounded-lg shadow-lg active:scale-95 transition-transform">ESTABLISH LINK</button>
        </div>
    </div>

    <div class="p-4 border-b border-green-500/20 bg-black flex justify-between items-center relative z-10">
        <div class="flex items-center gap-2">
            <div id="status-led" class="w-2 h-2 bg-red-600 rounded-full"></div>
            <h1 class="text-[10px] font-bold tracking-widest uppercase">Signal: <span id="geo-status">OFFLINE</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="setTeamCode()" class="px-2 py-1 border border-green-900 text-[8px] rounded uppercase">Team</button>
            <button onclick="toggleGhost()" id="ghost-btn" class="px-2 py-1 border border-green-900 text-[8px] rounded uppercase">Stealth</button>
        </div>
    </div>

    <div class="relative flex-1 bg-black">
        <div id="map"></div>
        <div class="absolute bottom-4 left-4 right-4 z-[1001] pointer-events-none">
            <div class="grid grid-cols-2 gap-2 mb-2 pointer-events-auto">
                <div class="bg-black/90 border border-green-900 p-2 text-center">
                    <p class="text-[7px] text-zinc-500 uppercase">Vector KM</p>
                    <p id="near-dist" class="text-xs font-bold text-green-500">---</p>
                </div>
                <div class="bg-black/90 border border-green-900 p-2 text-center">
                    <p class="text-[7px] text-zinc-500 uppercase">Nodes Found</p>
                    <p id="tower-info" class="text-xs font-bold text-green-500">0</p>
                </div>
            </div>
            <button onclick="manualScan()" class="w-full bg-zinc-900 border border-green-500 text-green-500 py-3 rounded uppercase text-[10px] tracking-widest font-bold pointer-events-auto active:bg-green-900">Manual Sector Scan</button>
        </div>
    </div>

    <div id="log" class="h-20 bg-black border-t border-green-900/30 p-2 overflow-y-auto text-[8px] font-mono text-green-800">
        > KERNEL INITIALIZED.
    </div>

    <script>
        const SB_URL = "https://eeuyzxggyyxnytxawwaj.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldXl6eGdneXl4bnl0eGF3d2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzAwMjEsImV4cCI6MjA4OTE0NjAyMX0.ymK6AubePnJvpKUD4kF4OO84tzVB838kobHZRSa4mwo";

        let map, userMarker, supabase, channel, teamCode = "0000", isGhost = false, tether = null, markers = {};

        function log(m) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function establishLink() {
            log("ATTEMPTING HANDSHAKE...");
            
            // SECURITY CHECK
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                alert("CRITICAL: GPS requires HTTPS connection.");
                log("ABORT: NON-SECURE CONTEXT");
                return;
            }

            try {
                // Initialize Supabase
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
                
                // Remove Launcher
                document.getElementById('launcher').style.display = 'none';
                
                // Initialize Map
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0,0], 2);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
                
                // Connect Realtime
                channel = supabase.channel('radar_v15');
                channel.on('presence', {event:'sync'}, handlePresence).subscribe(status => {
                    if(status === 'SUBSCRIBED') {
                        log("ENCRYPTED CHANNEL SECURED");
                        document.getElementById('status-led').style.backgroundColor = '#22c55e';
                        startGPS();
                    }
                });
            } catch (err) {
                log("FAULT: " + err.message);
                alert("Initialization Error. Check logs.");
            }
        }

        function startGPS() {
            log("OPENING HARDWARE PORT...");
            navigator.geolocation.watchPosition(p => {
                const { latitude: lat, longitude: lng } = p.coords;
                if(!userMarker) {
                    userMarker = L.circleMarker([lat, lng], {color: '#22c55e', fillOpacity:1, radius: 5}).addTo(map);
                    map.setView([lat, lng], 15);
                    log("FIX ACQUIRED");
                } else {
                    userMarker.setLatLng([lat, lng]);
                }
                document.getElementById('geo-status').innerText = `${lat.toFixed(3)}N ${lng.toFixed(3)}E`;
                if(!isGhost) channel.track({lat, lng, id: 'ALFA', team: teamCode});
                if(tether) updateTether();
            }, e => log("GPS ERR: " + e.message), {enableHighAccuracy:true, timeout: 10000});
        }

        function handlePresence() {
            const state = channel.presenceState();
            Object.values(state).flat().forEach(s => {
                if(s.id === 'ALFA' || markers[s.id] || s.team !== teamCode) return;
                const icon = L.divIcon({ html: `<div style="width:10px; height:10px; background:red; border-radius:50%; box-shadow:0 0 10px red;"></div>`, className:'' });
                markers[s.id] = L.marker([s.lat, s.lng], {icon}).addTo(map).on('click', () => drawTether(s.lat, s.lng));
                log("REMOTE NODE DETECTED");
            });
        }

        async function manualScan() {
            if(!userMarker) return log("SCAN REJECTED: NO FIX");
            log("SCANNING CELLULAR INFRA...");
            const p = userMarker.getLatLng();
            const query = `[out:json];node["man_made"~"tower|mast"](around:5000,${p.lat},${p.lng});out;`;
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                data.elements.forEach(node => {
                    if(markers[node.id]) return;
                    const icon = L.divIcon({ html: `<div style="width:6px; height:6px; background:#22c55e; border-radius:50%;"></div>`, className:'' });
                    markers[node.id] = L.marker([node.lat, node.lon], {icon}).addTo(map).on('click', () => drawTether(node.lat, node.lon));
                });
                document.getElementById('tower-info').innerText = data.elements.length;
                log(`SCAN SUCCESS: ${data.elements.length} NODES`);
            } catch(e) { log("SCAN TIMEOUT"); }
        }

        function drawTether(tLat, tLng) {
            if(tether) map.removeLayer(tether);
            const u = userMarker.getLatLng();
            tether = L.polyline([[u.lat, u.lng], [tLat, tLng]], {className: 'radar-line', weight: 1.5}).addTo(map);
            updateTether();
        }

        function updateTether() {
            if(!tether) return;
            const u = userMarker.getLatLng();
            const target = tether.getLatLngs()[1];
            tether.setLatLngs([[u.lat, u.lng], target]);
            const d = (map.distance(u, target) / 1000).toFixed(2);
            document.getElementById('near-dist').innerText = d + " KM";
        }

        function setTeamCode() {
            const c = prompt("CODE:", teamCode);
            if(c) { teamCode = c; log("TEAM UPDATED: " + c); }
        }

        function toggleGhost() {
            isGhost = !isGhost;
            document.getElementById('ghost-btn').innerText = isGhost ? "STEALTH: ON" : "STEALTH: OFF";
            log(isGhost ? "RADIO SILENCE" : "BROADCAST ACTIVE");
        }
    </script>
</body>
</html>
