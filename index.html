<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RADAR_OS // NET-SCANNER</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { background: #000; color: #3b82f6; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #map { height: 65vh; width: 100vw; background: #000; filter: invert(100%) hue-rotate(180deg) brightness(80%); }
        .terminal { height: 140px; background: rgba(0,0,0,0.9); border-top: 2px solid #1e3a8a; padding: 12px; font-size: 10px; overflow-y: auto; color: #60a5fa; }
        .scan-btn { @apply flex-1 bg-blue-700 text-white font-black py-4 rounded uppercase text-[10px] tracking-widest active:bg-blue-500 transition-all; }
        .node-mast { color: #ef4444; } /* Red for Masts */
        .node-wifi { color: #fbbf24; } /* Amber for WiFi */
        .node-fiber { color: #3b82f6; } /* Blue for Fiber */
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="absolute top-10 left-6 z-[3000] pointer-events-none">
        <h1 class="text-sm font-black tracking-[0.4em] text-blue-500">NET_SCANNER_V18</h1>
        <p id="stat-label" class="text-[9px] text-blue-900 font-bold uppercase mt-1">Infrastructure Mode: Active</p>
    </div>

    <div id="map"></div>

    <div class="p-4 bg-zinc-950 flex gap-2 z-[3000]">
        <button onclick="getLoc()" class="scan-btn">1. Set Fix</button>
        <button onclick="scanNet()" class="scan-btn bg-zinc-800 border border-blue-900">2. Scan Net Nodes</button>
    </div>

    <div class="terminal">
        <div id="log-content" class="space-y-1">
            <div>> READY TO SCAN LOCAL TOPOLOGY...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, userMarker, nodeLayer;

        function log(msg, colorClass = '') {
            const l = document.getElementById('log-content');
            l.innerHTML += `<div class="${colorClass}">> ${msg}</div>`;
            document.querySelector('.terminal').scrollTop = document.querySelector('.terminal').scrollHeight;
        }

        window.onload = () => {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([6.52, 3.37], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            nodeLayer = L.layerGroup().addTo(map);
            log("NET_SCANNER ENGINE ONLINE.");
        };

        function getLoc() {
            log("LOCKING GPS COORDINATES...");
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude: lat, longitude: lng } = pos.coords;
                if (userMarker) map.removeLayer(userMarker);
                userMarker = L.circleMarker([lat, lng], { color: '#3b82f6', radius: 8, fillOpacity: 1 }).addTo(map);
                map.setView([lat, lng], 16);
                log(`FIX SECURED: ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
            }, (e) => log("ERROR: " + e.message));
        }

        async function scanNet() {
            if (!userMarker) return log("SET FIX FIRST.", "text-red-500");
            const pos = userMarker.getLatLng();
            log("QUERYING LOCAL ISP INFRASTRUCTURE...");
            
            // Querying for: masts, cabinets (fiber), and public wifi nodes
            const q = `[out:json][timeout:25];
                (
                  node["man_made"~"tower|mast|communications_tower"](around:5000,${pos.lat},${pos.lng});
                  node["telecom"~"cabinet|exchange|distribution_point"](around:5000,${pos.lat},${pos.lng});
                  node["amenity"~"public_wifi|wlan"](around:5000,${pos.lat},${pos.lng});
                );
                out body;`;
            
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
                const data = await res.json();
                nodeLayer.clearLayers();
                
                if(data.elements.length === 0) {
                    log("NO INFRASTRUCTURE NODES FOUND IN 5KM.", "text-yellow-500");
                } else {
                    data.elements.forEach(n => {
                        let color = '#3b82f6'; // Default Fiber Blue
                        let label = "Telecom Node";

                        if(n.tags.man_made) { color = '#ef4444'; label = "Cellular Mast"; }
                        if(n.tags.amenity) { color = '#fbbf24'; label = "Public Access Point"; }

                        L.circleMarker([n.lat, n.lon], { 
                            color: color, radius: 5, weight: 2, fillOpacity: 0.5 
                        }).addTo(nodeLayer).bindPopup(`<b>${label}</b>`);
                    });
                    log(`DETECTED ${data.elements.length} ACTIVE INTERNET NODES.`, "text-blue-400");
                }
            } catch(e) { log("SCAN FAILED: DATA TIMEOUT."); }
        }
    </script>
</body>
</html>
