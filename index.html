<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RADAR_FINAL_FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 60vh; width: 100%; background: #020617; }
        body { background: #020617; color: #fff; font-family: monospace; margin: 0; }
        .console { height: 100px; background: #000; padding: 10px; font-size: 10px; color: #4ade80; overflow-y: auto; border-top: 1px solid #1e293b; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
        <h1 class="text-green-500 font-bold tracking-tighter">RADAR_OS_V15</h1>
        <div id="net-indicator" class="w-3 h-3 bg-red-600 rounded-full"></div>
    </div>

    <div id="map"></div>

    <div class="p-4 bg-slate-950 flex-1 flex flex-col gap-3">
        <button id="main-btn" onclick="initSystem()" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-4 rounded-lg uppercase tracking-widest transition-all">
            Connect & Locate
        </button>
        
        <div class="grid grid-cols-2 gap-2 text-[10px] uppercase text-slate-500">
            <div class="bg-slate-900 p-2 rounded">GPS: <span id="lat-out" class="text-white">---</span></div>
            <div class="bg-slate-900 p-2 rounded">LNG: <span id="lng-out" class="text-white">---</span></div>
        </div>
    </div>

    <div id="log" class="console">
        > SYSTEM STANDBY. TAP CONNECT.
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // USING THE FULL ANON KEY FROM YOUR TEXT
        const SB_URL = "https://eeuyzxggyyxnytxawwaj.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldXl6eGdneXl4bnl0eGF3d2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzAwMjEsImV4cCI6MjA4OTE0NjAyMX0.ymK6AubePnJvpKUD4kF4OO84tzVB838kobHZRSa4mwo";

        let map, userMarker, supabase, channel;

        function print(m) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        // Initialize empty map
        map = L.map('map', { zoomControl: false }).setView([9.08, 8.67], 6); // Centered roughly near Nigeria
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function initSystem() {
            const btn = document.getElementById('main-btn');
            btn.disabled = true;
            btn.innerText = "LINKING...";
            print("ACCESSING GEOLOCATION...");

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lng } = pos.coords;
                document.getElementById('lat-out').innerText = lat.toFixed(4);
                document.getElementById('lng-out').innerText = lng.toFixed(4);
                
                // Set Marker
                if(!userMarker) {
                    userMarker = L.circleMarker([lat, lng], { color: '#22c55e', radius: 10, fillOpacity: 1 }).addTo(map);
                }
                map.setView([lat, lng], 15);
                print("GPS FIX ACQUIRED.");

                // Connect Supabase
                try {
                    print("CONNECTING TO SUPABASE...");
                    supabase = window.supabase.createClient(SB_URL, SB_KEY);
                    channel = supabase.channel('radar_global');
                    
                    channel.subscribe(status => {
                        if(status === 'SUBSCRIBED') {
                            print("NETWORK ONLINE.");
                            document.getElementById('net-indicator').classList.replace('bg-red-600', 'bg-green-500');
                            btn.innerText = "SYSTEM ACTIVE";
                            btn.classList.replace('bg-green-600', 'bg-slate-800');
                            btn.style.color = "#22c55e";
                            
                            // Broadcast location
                            channel.track({ lat, lng, id: 'ALPHA_NODE' });
                        }
                    });

                    channel.on('presence', { event: 'sync' }, () => {
                        print("SYNCING NEARBY SIGNALS...");
                    });

                } catch (err) {
                    print("NET ERROR: " + err.message);
                    btn.disabled = false;
                    btn.innerText = "RETRY CONNECTION";
                }

            }, (err) => {
                print("GPS ERROR: " + err.message);
                alert("Please enable high-accuracy GPS and allow location access.");
                btn.disabled = false;
                btn.innerText = "CONNECT & LOCATE";
            }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
