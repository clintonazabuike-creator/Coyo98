<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RADAR_SOLO_V15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #020617; color: #4ade80; font-family: monospace; margin: 0; }
        #map { height: 55vh; width: 100%; background: #000; border-bottom: 2px solid #1e293b; }
        .terminal { height: 100px; background: #000; padding: 10px; font-size: 10px; overflow-y: auto; border: 1px solid #1e293b; margin: 10px; color: #22c55e; }
        input { background: #0f172a; border: 1px solid #1e293b; color: white; padding: 5px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="map"></div>

    <div class="flex-1 p-4 bg-slate-950 flex flex-col gap-3 overflow-y-auto">
        
        <div class="flex gap-2">
            <button onclick="getAutoLocation()" class="flex-1 bg-green-600 text-black font-black py-4 rounded-lg uppercase text-xs active:bg-green-400">
                Satellite Fix
            </button>
            <button onclick="scanTowers()" class="flex-1 bg-slate-800 text-green-500 font-bold py-4 rounded-lg uppercase text-xs border border-green-900">
                Scan Towers
            </button>
        </div>

        <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-800">
            <p class="text-[9px] text-slate-500 uppercase mb-2 font-bold tracking-widest text-center">Manual Coordinate Override</p>
            <div class="flex gap-2">
                <input id="m-lat" type="number" placeholder="LAT" class="flex-1">
                <input id="m-lng" type="number" placeholder="LNG" class="flex-1">
                <button onclick="setManualLocation()" class="bg-blue-600 text-white px-3 py-1 rounded text-[10px] font-bold">SET</button>
            </div>
        </div>

        <div id="term" class="terminal shadow-inner">
            > SYSTEM READY. AWAITING COMMAND.
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, userMarker, towerLayer;

        function log(msg) {
            const t = document.getElementById('term');
            t.innerHTML += `<div>> ${msg}</div>`;
            t.scrollTop = t.scrollHeight;
        }

        // Initialize Map Immediately on Load
        window.onload = () => {
            map = L.map('map', { zoomControl: false }).setView([9.08, 8.67], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            towerLayer = L.layerGroup().addTo(map);
            log("MAP ENGINE ONLINE.");
        };

        // Option A: Auto GPS
        function getAutoLocation() {
            log("POLLING SATELLITES...");
            navigator.geolocation.getCurrentPosition((p) => {
                updatePosition(p.coords.latitude, p.coords.longitude);
                log("AUTO-FIX SUCCESS.");
            }, (e) => {
                log("AUTO-FIX FAIL: " + e.message);
                alert("GPS Blocked. Use Manual Override below.");
            }, { enableHighAccuracy: true });
        }

        // Option B: Manual Input
        function setManualLocation() {
            const lat = parseFloat(document.getElementById('m-lat').value);
            const lng = parseFloat(document.getElementById('m-lng').value);
            if (!lat || !lng) return log("INPUT REQUIRED.");
            updatePosition(lat, lng);
            log("MANUAL POSITION SET.");
        }

        function updatePosition(lat, lng) {
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker([lat, lng], {
                color: '#22c55e', fillOpacity: 1, radius: 8
            }).addTo(map);
            map.setView([lat, lng], 15);
        }

        // Feature: Scan Infrastructure
        async function scanTowers() {
            if (!userMarker) return log("SET LOCATION FIRST.");
            log("QUERYING SECTOR INFRASTRUCTURE...");
            const pos = userMarker.getLatLng();
            const q = `[out:json];node["man_made"~"tower|mast"](around:5000,${pos.lat},${pos.lng});out;`;
            
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
                const data = await res.json();
                towerLayer.clearLayers();
                data.elements.forEach(node => {
                    L.circleMarker([node.lat, node.lon], {
                        color: '#ef4444', radius: 4, weight: 1
                    }).addTo(towerLayer);
                });
                log(`FOUND ${data.elements.length} NODES IN 5KM.`);
            } catch (e) {
                log("DATA FETCH FAILED.");
            }
        }
    </script>
</body>
</html>
