<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COMMANDER-OS: SIGNAL TRACKER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --main: #00ff41; --warn: #ffae00; --dead: #ff3c3c; --bg: #080808; }
        body { margin: 0; background: var(--bg); color: var(--main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; opacity: 0.4; }
        
        /* Tactical Header */
        .header {
            position: absolute; top: 45px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8); border: 1px solid var(--main);
            padding: 10px; z-index: 100; font-size: 12px;
        }

        /* Signal Log Window */
        .log-window {
            position: absolute; top: 110px; left: 15px; width: 220px;
            height: 120px; background: rgba(0,0,0,0.6); border-left: 2px solid var(--main);
            padding: 5px; font-size: 10px; overflow-y: auto; z-index: 90;
        }

        /* The Control Grid */
        .control-grid {
            position: absolute; bottom: 30px; left: 15px; right: 15px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            z-index: 1000; background: rgba(0,0,0,0.9); padding: 15px;
            border-top: 2px solid var(--main);
        }

        button {
            padding: 18px; background: #111; border: 1px solid var(--main);
            color: var(--main); font-weight: bold; font-family: monospace;
            cursor: pointer; transition: 0.3s;
        }
        button.active { background: var(--main); color: #000; }
        button.danger { border-color: var(--dead); color: var(--dead); }
        button:disabled { opacity: 0.3; border-color: #444; color: #444; }

        .led { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .led-on { background: var(--main); box-shadow: 0 0 10px var(--main); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="header">
    <div><span id="led-gps" class="led"></span> GPS: <span id="gps-stat">OFF</span></div>
    <div><span id="led-scan" class="led"></span> SCAN: <span id="scan-stat">IDLE</span></div>
</div>

<div class="log-window" id="log">>> SYSTEM READY. STANDBY FOR COMMAND.</div>

<div class="control-grid">
    <button onclick="toggleGPS()" id="btn-gps">ACTIVATE GPS</button>
    <button onclick="toggleScan()" id="btn-scan" disabled>SCAN DEVICES</button>
    <button onclick="dropManualMarker()">MARK TARGET</button>
    <button onclick="toggleGuide()" id="btn-guide">GUIDE BACK</button>
    <button onclick="clearSystem()" class="danger" style="grid-column: span 2;">PURGE ALL DATA</button>
</div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/dark',
        center: [0, 0], zoom: 2, pitch: 45
    });

    let path = [];
    let watchId = null;
    let scanInterval = null;
    let isGuiding = false;

    function log(msg) {
        const div = document.getElementById('log');
        div.innerHTML = `<div>> ${msg}</div>` + div.innerHTML;
    }

    // 1. MANUAL GPS TOGGLE
    function toggleGPS() {
        const btn = document.getElementById('btn-gps');
        const scanBtn = document.getElementById('btn-scan');
        
        if (watchId) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            btn.innerText = "ACTIVATE GPS";
            btn.classList.remove('active');
            scanBtn.disabled = true;
            document.getElementById('led-gps').classList.remove('led-on');
            log("GPS TERMINATED.");
        } else {
            btn.innerText = "GPS ACTIVE";
            btn.classList.add('active');
            scanBtn.disabled = false;
            document.getElementById('led-gps').classList.add('led-on');
            log("ESTABLISHING SATELLITE LINK...");
            
            watchId = navigator.geolocation.watchPosition(updatePos, null, {enableHighAccuracy:true});
        }
    }

    function updatePos(pos) {
        const pt = [pos.coords.longitude, pos.coords.latitude];
        path.push(pt);
        renderTrail();
        map.flyTo({ center: pt, zoom: 17 });
        document.getElementById('gps-stat').innerText = "FIXED";
    }

    // 2. MANUAL SCAN TOGGLE
    function toggleScan() {
        const btn = document.getElementById('btn-scan');
        if (scanInterval) {
            clearInterval(scanInterval);
            scanInterval = null;
            btn.innerText = "SCAN DEVICES";
            btn.classList.remove('active');
            document.getElementById('led-scan').classList.remove('led-on');
            log("SCANNER DEACTIVATED.");
        } else {
            btn.innerText = "SCANNING...";
            btn.classList.add('active');
            document.getElementById('led-scan').classList.add('led-on');
            log("SCANNING FOR MOBILE NODES...");
            
            scanInterval = setInterval(() => {
                const devices = ["iPhone (Personal)", "Android Node", "iPad/Tablet", "Mobile Hotspot", "Smart Watch"];
                const found = devices[Math.floor(Math.random() * devices.length)];
                log(`FOUND: ${found}`);
                
                // Drop marker at current loc
                if(path.length > 0) {
                    new maplibregl.Marker({ color: '#00d4ff', scale: 0.5 })
                        .setLngLat(path[path.length-1])
                        .addTo(map);
                }
            }, 3000);
        }
    }

    function renderTrail() {
        if (map.getSource('p')) {
            map.getSource('p').setData({"type": "Feature", "geometry": {"type": "LineString", "coordinates": path}});
        } else {
            map.addSource('p', { type: 'geojson', data: {"type": "Feature", "geometry": {"type": "LineString", "coordinates": path}} });
            map.addLayer({ id: 'p', type: 'line', source: 'p', paint: { 'line-color': '#00ff41', 'line-width': 3 } });
        }
    }

    function dropManualMarker() {
        if(path.length === 0) return alert("No GPS fix!");
        new maplibregl.Marker({ color: '#ff3c3c' }).setLngLat(path[path.length-1]).addTo(map);
        log("MANUAL WAYPOINT STORED.");
    }

    function toggleGuide() {
        const btn = document.getElementById('btn-guide');
        if(path.length < 2) return;
        isGuiding = !isGuiding;
        btn.classList.toggle('active');
        map.setPaintProperty('p', 'line-color', isGuiding ? '#ffffff' : '#00ff41');
        map.setPaintProperty('p', 'line-dasharray', isGuiding ? [2, 1] : [1, 0]);
        log(isGuiding ? "RETURN PROTOCOL ENGAGED." : "MAPPING MODE.");
    }

    function clearSystem() {
        if(confirm("WIPE ALL DATA?")) location.reload();
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
</script>
</body>
</html>
