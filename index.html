<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GHOST_OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #000; color: #10b981; font-family: monospace; margin: 0; overflow: hidden; }
        #map { height: 70vh; width: 100vw; background: #000; filter: contrast(120%) brightness(80%) grayscale(100%) invert(100%); }
        .panic-mode { display: none; background: #111; height: 100vh; width: 100vw; padding: 40px; color: #555; text-align: center; }
        .terminal { height: 150px; background: #050505; border-top: 1px solid #10b981; padding: 10px; font-size: 10px; overflow-y: auto; }
        .btn-tac { @apply flex-1 bg-zinc-900 border border-emerald-900 text-emerald-500 py-3 rounded uppercase text-[9px] font-bold active:bg-emerald-500 active:text-black; }
    </style>
</head>
<body>

    <div id="decoy" class="panic-mode">
        <h2 class="text-xl mb-4">Calculator</h2>
        <div class="grid grid-cols-4 gap-2">
            <div class="bg-zinc-800 p-4">7</div><div class="bg-zinc-800 p-4">8</div><div class="bg-zinc-800 p-4">9</div><div class="bg-orange-600 p-4">/</div>
            <div class="bg-zinc-800 p-4">4</div><div class="bg-zinc-800 p-4">5</div><div class="bg-zinc-800 p-4">6</div><div class="bg-orange-600 p-4">x</div>
        </div>
        <button onclick="togglePanic()" class="mt-10 opacity-10 text-[8px]">Exit System</button>
    </div>

    <div id="main-app">
        <div id="map"></div>
        
        <div class="p-4 flex flex-col gap-2">
            <div class="flex gap-2">
                <button onclick="getFix()" class="btn-tac bg-emerald-900/20">Sync Fix</button>
                <button onclick="markNode()" class="btn-tac">Mark Signal</button>
                <button onclick="togglePanic()" class="btn-tac border-red-900 text-red-900">Panic</button>
            </div>
            
            <div class="terminal" id="term">> STANDBY FOR DATA...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, userMarker, intelGroup;

        window.onload = () => {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([6.5, 3.3], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            intelGroup = L.layerGroup().addTo(map);
            log("GHOST_OS v1.0 ONLINE.");
        };

        function log(m) {
            const t = document.getElementById('term');
            t.innerHTML += `<div>> ${m}</div>`;
            t.scrollTop = t.scrollHeight;
        }

        function togglePanic() {
            const main = document.getElementById('main-app');
            const decoy = document.getElementById('decoy');
            if (main.style.display === 'none') {
                main.style.display = 'block';
                decoy.style.display = 'none';
            } else {
                main.style.display = 'none';
                decoy.style.display = 'block';
            }
        }

        function getFix() {
            navigator.geolocation.getCurrentPosition(p => {
                const { latitude: lat, longitude: lng } = p.coords;
                if (!userMarker) {
                    userMarker = L.circleMarker([lat, lng], { color: '#10b981', radius: 6, fillOpacity: 1 }).addTo(map);
                } else { userMarker.setLatLng([lat, lng]); }
                map.setView([lat, lng], 16);
                log(`LOCKED: ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
            });
        }

        function markNode() {
            if (!userMarker) return log("ERROR: NO FIX");
            const pos = userMarker.getLatLng();
            L.circleMarker([pos.lat, pos.lng], { color: '#fff', radius: 4 }).addTo(intelGroup);
            log("SIGNAL NODE MARKED MANUALLY.");
            
            // Save to phone's local memory automatically
            const saved = JSON.parse(localStorage.getItem('nodes') || '[]');
            saved.push({lat: pos.lat, lng: pos.lng, time: Date.now()});
            localStorage.setItem('nodes', JSON.stringify(saved));
        }
    </script>
</body>
</html>
