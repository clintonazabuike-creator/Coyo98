<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SPECTRUM_OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fbbf24; font-family: monospace; margin: 0; overflow: hidden; }
        .scanner-ring { width: 250px; height: 250px; border: 2px solid #fbbf24; border-radius: 50%; position: relative; margin: 50px auto; box-shadow: 0 0 20px #fbbf2433; }
        .needle { width: 50%; height: 2px; background: #fbbf24; position: absolute; top: 50%; left: 50%; transform-origin: left; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .stat-box { @apply bg-zinc-900 border border-amber-900/50 p-4 rounded-lg text-center; }
        .glitch { animation: glitch 1s infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-6">

    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-xl font-black tracking-tighter italic">SPECTRUM_V21</h1>
            <p class="text-[8px] text-amber-700 uppercase">Acoustic & Magnetic Recon</p>
        </div>
        <div id="status-led" class="w-3 h-3 bg-red-600 rounded-full glitch"></div>
    </div>

    <div class="scanner-ring">
        <div class="needle"></div>
        <div class="absolute inset-0 flex items-center justify-center">
            <div class="text-center">
                <div id="sig-level" class="text-4xl font-black">--</div>
                <div class="text-[9px] uppercase opacity-50">Signal Flux</div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="stat-box">
            <div id="mag-val" class="text-xl font-bold">0.00</div>
            <div class="text-[8px] uppercase">Magnetic µT</div>
        </div>
        <div class="stat-box">
            <div id="lat-val" class="text-xl font-bold">--</div>
            <div class="text-[8px] uppercase">Sector Lat</div>
        </div>
    </div>

    <button onclick="engageSensors()" class="w-full py-5 bg-amber-600 text-black font-black uppercase tracking-widest rounded shadow-xl active:scale-95 transition-all">
        Engage Sensors
    </button>

    <div id="log" class="mt-6 h-32 overflow-y-auto text-[9px] text-amber-900 space-y-1">
        > KERNEL STANDBY. INITIALIZE SENSORS TO BEGIN RECON.
    </div>

    <script>
        function log(m) {
            const l = document.getElementById('log');
            l.innerHTML += `<div>> ${m}</div>`;
            l.scrollTop = l.scrollHeight;
        }

        async function engageSensors() {
            log("BOOTING SENSOR ARRAY...");
            document.getElementById('status-led').classList.replace('bg-red-600', 'bg-green-500');

            // 1. Connection Sniffing
            if (navigator.connection) {
                const updateConn = () => {
                    const speed = navigator.connection.downlink;
                    document.getElementById('sig-level').innerText = speed;
                    log(`DATA_FLUX: ${speed} Mbps`);
                };
                navigator.connection.onchange = updateConn;
                updateConn();
            }

            // 2. Magnetic Field (Magnetometer)
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    // Simulating magnetic flux via orientation change
                    const flux = (Math.abs(e.alpha) + Math.abs(e.beta)) / 10;
                    document.getElementById('mag-val').innerText = flux.toFixed(2);
                });
            }

            // 3. GPS Position
            navigator.geolocation.watchPosition(p => {
                document.getElementById('lat-val').innerText = p.coords.latitude.toFixed(3);
                log("SECTOR COORDINATES UPDATED.");
            });
        }
    </script>
</body>
</html>
