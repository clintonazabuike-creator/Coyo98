<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COMMANDER-OS: SIGINT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --neon: #00ff41; --intel: #00d4ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: monospace; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; opacity: 0.5; background: #000; }
        
        /* Tactical Header */
        .hud-header {
            position: absolute; top: 40px; left: 10px; right: 10px;
            background: rgba(0,20,0,0.9); border: 1px solid var(--neon);
            padding: 10px; z-index: 100; font-size: 11px; display: flex; justify-content: space-between;
        }

        /* Signal Log */
        .log-panel {
            position: absolute; top: 100px; left: 10px; width: 200px;
            height: 150px; font-size: 10px; color: var(--intel);
            overflow: hidden; pointer-events: none; text-shadow: 0 0 5px #000;
        }

        /* Control Grid */
        .control-grid {
            position: absolute; bottom: 30px; left: 10px; right: 10px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            background: rgba(0,0,0,0.95); padding: 15px; border-top: 2px solid var(--neon); z-index: 1000;
        }

        button {
            padding: 18px 5px; background: #010; border: 1px solid var(--neon);
            color: var(--neon); font-family: monospace; font-weight: bold; font-size: 11px;
        }
        button.active { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        button:disabled { opacity: 0.2; border-color: #333; }

        /* Scanner Pulse Effect */
        .radar-pulse {
            position: absolute; top: 50%; left: 50%; width: 300px; height: 300px;
            border: 1px solid var(--intel); border-radius: 50%;
            transform: translate(-50%, -50%) scale(0); opacity: 0;
            pointer-events: none; z-index: 5;
        }
        .anim-radar { animation: radar-sweep 2s linear infinite; }
        @keyframes radar-sweep {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="radar" class="radar-pulse"></div>

<div class="hud-header">
    <div>GPS: <span id="gps-stat">STANDBY</span></div>
    <div>NODES: <span id="node-count">0</span></div>
</div>

<div class="log-panel" id="log"></div>

<div class="control-grid">
    <button onclick="initSystem()" id="btn-gps">ACTIVATE GPS</button>
    <button onclick="toggleScanner()" id="btn-scan" disabled>MANUAL SCAN</button>
    <button onclick="dropTarget()">MARK POINT</button>
    <button onclick="guideProtocol()">GUIDE BACK</button>
    <button onclick="location.reload()" style="grid-column: span 2; border-color: #ff3c3c; color: #ff3c3c;">EMERGENCY PURGE</button>
</div>

<script>
    // 1. Map Fixer Configuration
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/liberty', // Changed to Liberty for better loading
        center: [0, 0], zoom: 1, pitch: 45, antialias: true
    });

    let path = [];
    let watchId = null;
    let isScanning = false;
    let isGuiding = false;

    // Force Map Refresh (Fixes Black Screen)
    map.on('load', () => { 
        console.log("Map Tiles Loaded");
        map.resize(); 
    });

    function logMsg(m) {
        const l = document.getElementById('log');
        l.innerHTML = `<div>> ${m}</div>` + l.innerHTML;
    }

    // 2. Manual System Init
    function initSystem() {
        const btn = document.getElementById('btn-gps');
        if (watchId) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            btn.innerText = "ACTIVATE GPS";
            btn.classList.remove('active');
            document.getElementById('gps-stat').innerText = "OFFLINE";
            document.getElementById('btn-scan').disabled = true;
        } else {
            btn.innerText = "GPS ACTIVE";
            btn.classList.add('active');
            document.getElementById('gps-stat').innerText = "LINKED";
            document.getElementById('btn-scan').disabled = false;
            
            // Force Map to wake up
            map.resize();

            watchId = navigator.geolocation.watchPosition((pos) => {
                const pt = [pos.coords.longitude, pos.coords.latitude];
                path.push(pt);
                updateTrail();
                map.flyTo({ center: pt, zoom: 17, speed: 1.5 });
            }, (err) => alert("GPS Denied"), { enableHighAccuracy: true });
        }
    }

    // 3. Manual Scanner (The "Amaze" Part)
    function toggleScanner() {
        isScanning = !isScanning;
        const btn = document.getElementById('btn-scan');
        const radar = document.getElementById('radar');
        
        if (isScanning) {
            btn.classList.add('active');
            radar.classList.add('anim-radar');
            logMsg("SCANNING SPECTRUM...");
            
            // Simulated Phone/Device Discovery
            this.scanTimer = setInterval(() => {
                const devices = ["iOS Node", "Android Mobile", "Wearable BLE", "Hidden Hotspot"];
                const dev = devices[Math.floor(Math.random() * devices.length)];
                logMsg(`FOUND: ${dev}`);
                
                if (path.length > 0) {
                    new maplibregl.Marker({ color: '#00d4ff', scale: 0.6 })
                        .setLngLat([path[path.length-1][0] + (Math.random()-0.5)*0.001, path[path.length-1][1] + (Math.random()-0.5)*0.001])
                        .addTo(map);
                }
                document.getElementById('node-count').innerText = document.querySelectorAll('#log div').length;
            }, 4000);
        } else {
            btn.classList.remove('active');
            radar.classList.remove('anim-radar');
            clearInterval(this.scanTimer);
            logMsg("SCANNER STANDBY.");
        }
    }

    function updateTrail() {
        if (map.getSource('p')) {
            map.getSource('p').setData({"type": "Feature", "geometry": {"type": "LineString", "coordinates": path}});
        } else {
            map.addSource('p', { type: 'geojson', data: {"type": "Feature", "geometry": {"type": "LineString", "coordinates": path}} });
            map.addLayer({ id: 'p', type: 'line', source: 'p', paint: { 'line-color': '#00ff41', 'line-width': 4 } });
        }
    }

    function dropTarget() {
        if (path.length === 0) return;
        new maplibregl.Marker({ color: '#ff3c3c' }).setLngLat(path[path.length-1]).addTo(map);
        logMsg("TARGET MARKED.");
    }

    function guideProtocol() {
        if (path.length < 2) return;
        isGuiding = !isGuiding;
        map.setPaintProperty('p', 'line-color', isGuiding ? '#fff' : '#00ff41');
        map.setPaintProperty('p', 'line-dasharray', isGuiding ? [2, 1] : [1, 0]);
        logMsg(isGuiding ? "RETURN MODE ENGAGED" : "TRACKING MODE");
    }

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
</script>
</body>
</html>
