<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RADAR_OS // INTERCEPTOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #000; color: #3b82f6; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #map { height: 60vh; width: 100vw; background: #000; filter: invert(100%) hue-rotate(190deg) brightness(80%) contrast(150%); }
        .terminal { height: 200px; background: rgba(0,5,10,0.95); border-top: 1px solid #1e3a8a; padding: 15px; font-size: 10px; overflow-y: auto; color: #3b82f6; }
        .scanning-bar { width: 100%; height: 2px; background: #3b82f6; position: absolute; top: 0; animation: scan 2s linear infinite; z-index: 2000; box-shadow: 0 0 15px #3b82f6; }
        @keyframes scan { from { top: 0; } to { top: 60vh; } }
        .btn-intercept { @apply flex-1 bg-blue-900/40 border border-blue-500 text-blue-400 py-3 rounded font-black text-[9px] uppercase tracking-tighter active:bg-blue-500 active:text-white; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="scanning-bar" id="scanner" style="display:none;"></div>

    <div id="map"></div>

    <div class="p-4 bg-zinc-950 flex flex-col gap-2 border-t border-blue-900/30">
        <div class="flex gap-2">
            <button onclick="syncFix()" class="btn-intercept">1. Set Base</button>
            <button onclick="startIntercept()" class="btn-intercept">2. Intercept Nodes</button>
        </div>
        <button onclick="toggleScanner()" class="w-full py-1 text-[8px] border border-blue-900/20 text-blue-900 uppercase">Toggle Spectrum Scan</button>
    </div>

    <div class="terminal" id="term">
        <div class="text-blue-500 font-bold mb-2">INTERCEPTOR_MODULE_ACTIVE</div>
        <div id="log-content">> STANDBY FOR PACKET CAPTURE...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, userMarker, nodeLayer;

        window.onload = () => {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([6.5, 3.3], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            nodeLayer = L.layerGroup().addTo(map);
            log("LISTENING ON PORT 80/443...");
        };

        function log(m, type = 'info') {
            const l = document.getElementById('log-content');
            const color = type === 'warn' ? 'text-yellow-500' : 'text-blue-400';
            l.innerHTML += `<div class="${color}">> [${new Date().toLocaleTimeString()}] ${m}</div>`;
            document.getElementById('term').scrollTop = document.getElementById('term').scrollHeight;
        }

        function toggleScanner() {
            const s = document.getElementById('scanner');
            s.style.display = s.style.display === 'none' ? 'block' : 'none';
        }

        function syncFix() {
            navigator.geolocation.getCurrentPosition(p => {
                const { latitude: lat, longitude: lng } = p.coords;
                if (!userMarker) {
                    userMarker = L.circleMarker([lat, lng], { color: '#3b82f6', radius: 6 }).addTo(map);
                } else { userMarker.setLatLng([lat, lng]); }
                map.setView([lat, lng], 17);
                log(`BASE_STATION_SYNC: ${lat.toFixed(4)},${lng.toFixed(4)}`);
            });
        }

        async function startIntercept() {
            if(!userMarker) return log("ERR: SYNC BASE FIRST", "warn");
            log("SCANNING FOR PUBLIC IP GATEWAYS...");
            
            const pos = userMarker.getLatLng();
            // This queries for routers, wifi points, and switches
            const q = `[out:json];(node["telecom"~"exchange|distribution_point"](around:2000,${pos.lat},${pos.lng});node["amenity"~"public_wifi"](around:2000,${pos.lat},${pos.lng}););out body;`;
            
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
                const data = await res.json();
                
                data.elements.forEach(n => {
                    // Create a "Radius" of connection (approx 100m)
                    L.circle([n.lat, n.lon], {
                        radius: 100, color: '#3b82f6', fillOpacity: 0.1, weight: 1
                    }).addTo(nodeLayer);
                    
                    L.circleMarker([n.lat, n.lon], { color: '#3b82f6', radius: 3 }).addTo(nodeLayer);
                });
                
                log(`INTERCEPTED ${data.elements.length} GATEWAYS. EVERY DEVICE IN THESE BLUE CIRCLES IS CONNECTED.`, "warn");
            } catch(e) { log("INTERCEPT_TIMEOUT"); }
        }
    </script>
</body>
</html>
