<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RADAR_FINAL_DEBUG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #020617; color: #4ade80; font-family: monospace; margin: 0; padding: 20px; }
        #map { height: 300px; width: 100%; background: #000; margin-top: 20px; border: 1px solid #1e293b; }
        .terminal { background: #000; padding: 15px; border: 1px solid #1e293b; height: 150px; overflow-y: auto; font-size: 11px; margin-top: 20px; }
    </style>
</head>
<body>

    <h1 class="text-xl font-bold mb-4 text-center">RADAR TERMINAL</h1>

    <button id="start-btn" onclick="runDiagnostic()" class="w-full bg-green-600 text-black font-black py-5 rounded-lg uppercase shadow-[0_0_20px_rgba(34,197,94,0.3)]">
        Initialize System
    </button>

    <div id="map"></div>

    <div id="console" class="terminal">
        > SYSTEM IDLE. PRESS INITIALIZE.
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SB_URL = "https://eeuyzxggyyxnytxawwaj.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldXl6eGdneXl4bnl0eGF3d2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzAwMjEsImV4cCI6MjA4OTE0NjAyMX0.ymK6AubePnJvpKUD4kF4OO84tzVB838kobHZRSa4mwo";
        
        let map, userMarker, supabase;

        function log(msg) {
            const c = document.getElementById('console');
            c.innerHTML += `<div>> ${msg}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        // THIS IS THE FIRST THING THAT RUNS
        function runDiagnostic() {
            alert("Diagnostic Started..."); // If this shows, the button works!
            log("DIAGNOSTIC BEGUN...");
            
            // Start GPS
            if (navigator.geolocation) {
                log("REQUESTING GPS...");
                navigator.geolocation.getCurrentPosition(successGPS, failGPS, {enableHighAccuracy: true});
            } else {
                log("ERROR: GPS NOT SUPPORTED");
            }
        }

        function successGPS(pos) {
            const { latitude: lat, longitude: lng } = pos.coords;
            log(`GPS FIX: ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
            
            // Load Map
            if (!map) {
                map = L.map('map').setView([lat, lng], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                userMarker = L.circleMarker([lat, lng], {color: 'green', radius: 10}).addTo(map);
            }
            
            connectSupabase(lat, lng);
        }

        function failGPS(err) {
            log("GPS FAIL: " + err.message);
            alert("GPS Error. Check your phone's location settings.");
        }

        function connectSupabase(lat, lng) {
            log("CONNECTING TO SUPABASE...");
            try {
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
                const channel = supabase.channel('radar_test');
                
                channel.subscribe(status => {
                    log("NET STATUS: " + status);
                    if(status === 'SUBSCRIBED') {
                        log("NETWORK ONLINE. BROADCASTING...");
                        channel.track({lat, lng, id: 'USER_1'});
                        document.getElementById('start-btn').innerText = "SYSTEM ONLINE";
                        document.getElementById('start-btn').style.backgroundColor = "#1e293b";
                        document.getElementById('start-btn').style.color = "#4ade80";
                    }
                });
            } catch(e) {
                log("SUPABASE ERROR: " + e.message);
            }
        }
    </script>
</body>
</html>
