<!DOCTYPE html>
<html>
<head>
    <title>GHOST TRACKER OS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; font-family: monospace; color: #0f0; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background: #010; }
        .ui-panel {
            position: absolute; bottom: 20px; left: 10px; right: 10px;
            background: rgba(0, 15, 0, 0.95); border: 2px solid #0f0;
            padding: 15px; z-index: 100; border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        }
        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        button {
            flex: 1; padding: 15px; background: #030; border: 1px solid #0f0;
            color: #0f0; font-family: monospace; font-weight: bold; font-size: 14px;
        }
        button:active { background: #0f0; color: #000; }
        #status { font-size: 11px; border-bottom: 1px solid #0f0; padding-bottom: 5px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <div id="status">SENSORS ONLINE // STANDBY</div>
    <div class="btn-row">
        <button onclick="startTracking()" id="t-btn">ENGAGE TRACK</button>
        <button onclick="guideBack()">GUIDE BACK</button>
    </div>
</div>

<script>
    // NEW 2026 STABLE FREE LINK
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://tiles.openfreemap.org/styles/liberty', 
        center: [0, 0],
        zoom: 2
    });

    let trail = [];
    let isTracking = false;

    function startTracking() {
        if (isTracking) return;
        isTracking = true;
        document.getElementById('t-btn').innerText = "TRACKING...";
        
        navigator.geolocation.watchPosition((pos) => {
            const pt = [pos.coords.longitude, pos.coords.latitude];
            trail.push(pt);
            
            document.getElementById('status').innerText = `LAT: ${pt[1].toFixed(5)} | LNG: ${pt[0].toFixed(5)}`;
            
            drawTrail();
            map.flyTo({ center: pt, zoom: 17 });
            if(navigator.vibrate) navigator.vibrate(40);
        }, (err) => {
            document.getElementById('status').innerText = "ERROR: CHECK GPS PERMISSIONS";
        }, { enableHighAccuracy: true });
    }

    function drawTrail() {
        if (map.getSource('path')) {
            map.getSource('path').setData({
                "type": "Feature", "geometry": { "type": "LineString", "coordinates": trail }
            });
        } else {
            map.addSource('path', { type: 'geojson', data: { "type": "Feature", "geometry": { "type": "LineString", "coordinates": trail } } });
            map.addLayer({
                id: 'path', type: 'line', source: 'path',
                paint: { 'line-color': '#0f0', 'line-width': 4 }
            });
        }
    }

    function guideBack() {
        if (trail.length < 2) return;
        map.setPaintProperty('path', 'line-color', '#fff');
        map.setPaintProperty('path', 'line-dasharray', [2, 1]);
        alert("RETURN PATH ACTIVE. FOLLOW THE FLASHING LINE.");
    }
    
    // Fix for the "Black Map" on some mobile browsers
    map.on('load', () => { map.resize(); });
</script>
</body>
</html>
