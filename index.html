<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MANUAL TRACKER PRO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        #map { height: 50vh; width: 100%; background: #111; border-bottom: 2px solid #222; }
        .btn-action { @apply w-full py-4 rounded-lg font-bold text-sm uppercase tracking-widest transition-all active:scale-95; }
        body { background: #000; color: #eee; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="p-4 bg-zinc-900 flex justify-between items-center border-b border-zinc-800">
        <h1 class="text-blue-500 font-black italic">OMNI_CORE</h1>
        <div id="status" class="text-[10px] bg-red-900/30 text-red-500 px-2 py-1 rounded">OFFLINE</div>
    </div>

    <div id="map"></div>

    <div class="p-4 space-y-3">
        <div class="grid grid-cols-2 gap-2">
            <button onclick="startLocation()" class="btn-action bg-blue-600 text-white">1. Get Location</button>
            <button onclick="connectNet()" class="btn-action bg-green-600 text-black">2. Connect Net</button>
        </div>
        
        <button onclick="manualScan()" class="btn-action bg-zinc-800 text-zinc-300">3. Scan Nearby Towers</button>
        
        <div class="bg-zinc-900 p-3 rounded border border-zinc-800 text-[11px] font-mono">
            <div class="flex justify-between border-b border-zinc-800 pb-1 mb-1">
                <span>COORD:</span> <span id="out-geo">0.00, 0.00</span>
            </div>
            <div class="flex justify-between">
                <span>TEAM:</span> <span id="out-team">0000</span>
            </div>
        </div>

        <div id="console" class="h-24 overflow-y-auto bg-black p-2 text-[10px] text-zinc-500 border border-zinc-800 rounded">
            > System Ready. Tap "Get Location" to start.
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SB_URL = "https://eeuyyxggyyxnytxawwaj.supabase.co"; // Corrected key from your previous msg
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldXl6eGdneXl4bnl0eGF3d2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzAwMjEsImV4cCI6MjA4OTE0NjAyMX0.ymK6AubePnJvpKUD4kF4OO84tzVB838kobHZRSa4mwo";

        let map, userMarker, supabase, channel;
        let markers = {};

        // 0. Log Function
        function print(msg) {
            const c = document.getElementById('console');
            c.innerHTML += `<div>> ${msg}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        // 1. Initialize Map on load (Empty)
        window.onload = () => {
            map = L.map('map', { zoomControl: false }).setView([6.5, 3.3], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            print("Map Initialized.");
        };

        // 2. Manual Location Request
        function startLocation() {
            print("Requesting GPS...");
            navigator.geolocation.getCurrentPosition(p => {
                const { latitude: lat, longitude: lng } = p.coords;
                document.getElementById('out-geo').innerText = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                
                if(!userMarker) {
                    userMarker = L.circleMarker([lat, lng], { color: '#3b82f6', radius: 8, fillOpacity: 1 }).addTo(map);
                } else {
                    userMarker.setLatLng([lat, lng]);
                }
                map.setView([lat, lng], 15);
                print("Location Found.");
            }, e => print("GPS Error: " + e.message), { enableHighAccuracy: true });
        }

        // 3. Manual Network Connect
        async function connectNet() {
            try {
                print("Connecting to Supabase...");
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
                channel = supabase.channel('radar_manual');
                
                channel.subscribe(status => {
                    if(status === 'SUBSCRIBED') {
                        document.getElementById('status').innerText = "ONLINE";
                        document.getElementById('status').classList.replace('text-red-500', 'text-green-500');
                        print("Network Connected.");
                        
                        // Start broadcasting if we have location
                        if(userMarker) {
                            const pos = userMarker.getLatLng();
                            channel.track({ lat: pos.lat, lng: pos.lng, user: 'Manual_Node' });
                        }
                    }
                });

                channel.on('presence', { event: 'sync' }, () => {
                    const state = channel.presenceState();
                    print("Syncing nearby nodes...");
                    // Logic to draw other markers goes here
                });
            } catch (err) {
                print("Net Error: " + err.message);
            }
        }

        // 4. Manual Infrastructure Scan
        async function manualScan() {
            if(!userMarker) return print("Need GPS first.");
            print("Scanning for towers...");
            const p = userMarker.getLatLng();
            const query = `[out:json];node["man_made"~"tower|mast"](around:5000,${p.lat},${p.lng});out;`;
            
            try {
                const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                const data = await res.json();
                data.elements.forEach(node => {
                    L.circleMarker([node.lat, node.lon], { color: '#22c55e', radius: 4 }).addTo(map);
                });
                print(`Found ${data.elements.length} nodes.`);
            } catch (e) {
                print("Scan Error.");
            }
        }
    </script>
</body>
</html>
