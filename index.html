<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RADAR_OS_STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #020617; color: #4ade80; font-family: monospace; margin: 0; overflow: hidden; }
        #map { height: 50vh; width: 100%; background: #000; border-bottom: 1px solid #1e293b; display: none; }
        .console { height: 120px; background: #000; padding: 10px; font-size: 10px; overflow-y: auto; color: #16a34a; border: 1px solid #1e293b; margin: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div class="p-6 text-center">
        <h1 class="text-xl font-black tracking-widest mb-2 text-white">RADAR_OS v15</h1>
        <p class="text-[10px] text-slate-500 uppercase mb-6">Secure Geospatial Terminal</p>
        
        <button id="activate-btn" class="w-full bg-green-600 text-black font-black py-5 rounded-xl uppercase shadow-lg active:scale-95 transition-all">
            Initialize Link
        </button>
    </div>

    <div id="map"></div>

    <div id="terminal" class="console">
        > KERNEL READY. AWAITING INITIALIZATION...
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SB_URL = "https://eeuyzxggyyxnytxawwaj.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVldXl6eGdneXl4bnl0eGF3d2FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzAwMjEsImV4cCI6MjA4OTE0NjAyMX0.ymK6AubePnJvpKUD4kF4OO84tzVB838kobHZRSa4mwo";

        let map, userMarker, supabase;

        function log(m) {
            const t = document.getElementById('terminal');
            t.innerHTML += `<div>> ${m}</div>`;
            t.scrollTop = t.scrollHeight;
        }

        // The logic starts here when you click the button
        document.getElementById('activate-btn').addEventListener('click', function() {
            this.innerText = "CONNECTING...";
            this.classList.replace('bg-green-600', 'bg-slate-800');
            this.style.color = "white";
            
            log("DIAGNOSTIC STARTED...");
            startRadar();
        });

        function startRadar() {
            log("FETCHING GPS DATA...");
            
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude: lat, longitude: lng } = pos.coords;
                log(`FIX ACQUIRED: ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
                
                // Show and Init Map
                document.getElementById('map').style.display = 'block';
                if (!map) {
                    map = L.map('map', { zoomControl: false }).setView([lat, lng], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    userMarker = L.circleMarker([lat, lng], {color: '#22c55e', radius: 10, fillOpacity: 0.8}).addTo(map);
                }

                // Connect to Supabase
                connectNet(lat, lng);

            }, (err) => {
                log("GPS ERROR: " + err.message);
                alert("Please enable Location services!");
            }, { enableHighAccuracy: true });
        }

        function connectNet(lat, lng) {
            log("ESTABLISHING SUPABASE HANDSHAKE...");
            try {
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
                const channel = supabase.channel('radar_v15');
                
                channel.subscribe(status => {
                    log("NET STATUS: " + status);
                    if(status === 'SUBSCRIBED') {
                        log("ENCRYPTED CHANNEL SECURED.");
                        channel.track({lat, lng, id: 'ALFA_NODE'});
                        document.getElementById('activate-btn').innerText = "SYSTEM ONLINE";
                    }
                });
            } catch(e) {
                log("NET CRASH: " + e.message);
            }
        }
    </script>
</body>
</html>
